<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Currency Converter</title>

    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

    <div class="app-shell">
        <header class="topbar">
            <div>
                <p class="eyebrow">Live exchange insights</p>
                <h1>Crypto Currency Converter</h1>
            </div>
            <div class="user-pill">
                <span>Welcome</span>
                <strong id="welcomeUser"></strong>
            </div>
        </header>

        <main class="container">
            <section class="card">
                <div class="form-group">
                    <label for="crypto">Select Cryptocurrency</label>

                    <select id="crypto">
                        <option value="bitcoin">Bitcoin (BTC)</option>
                        <option value="ethereum">Ethereum (ETH)</option>
                        <option value="litecoin">Litecoin (LTC)</option>
                        <option value="dogecoin">Dogecoin (DOGE)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="currency">Convert To</label>

                    <select id="currency">
                        <option value="usd">USD ($)</option>
                        <option value="inr">INR (₹)</option>
                        <option value="eur">EUR (€)</option>
                        <option value="gbp">GBP (£)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="amount">Enter Amount</label>
                    <input
                        type="number"
                        id="amount"
                        placeholder="Enter Amount"
                        min="1"
                    >
                </div>

                <button id="convertBtn">Convert</button>
                <button id="saveBtn">Save Favorite</button>
            </section>

            <aside class="side-panel">
                <div class="result-card">
                    <h2>Current Price</h2>
                    <p id="currentPrice">--</p>

                    <h2>Converted Amount</h2>
                    <p id="convertedAmount">--</p>
                </div>

                <div class="favorites">
                    <h2>Favorite Pairs</h2>
                    <ul id="favoritesList"></ul>
                </div>
            </aside>
        </main>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/dashboard.js"></script>

</body>
</html>
